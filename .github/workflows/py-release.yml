name: PIP Release

on:
  workflow_dispatch:
  repository_dispatch:
    types: [platform-release]

permissions:
  contents: read

jobs:
  find-latest-tag:
    name: Find Latest Tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.get-tag.outputs.tag }}
    steps:
      - name: Find latest tag
        id: get-tag
        uses: oprypin/find-latest-tag@v1
        with:
          repository: gnpaone/rust-just
          releases-only: true

  linux:
    runs-on: ${{ matrix.runner }}
    needs: [find-latest-tag]
    strategy:
      matrix:
        runner: [ubuntu-latest]
        target: [x86_64, x86, aarch64, armv7, s390x, ppc64le, riscv64, loongarch64]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.find-latest-tag.outputs.tag }}
      - name: Copy README.md and LICENSE
        run: |
          cp README.md pypi/
          cp LICENSE pypi/
          rm -f README.md
          rm -f LICENSE
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          working-directory: pypi
          target: ${{ matrix.target }}
          args: --release --out dist
          sccache: 'true'
          manylinux: auto
      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: "wheels-linux-${{ matrix.target }}"
          path: pypi/dist
          retention-days: 7

  musllinux:
    runs-on: ${{ matrix.runner }}
    needs: [find-latest-tag]
    strategy:
      matrix:
        runner: [ubuntu-latest]
        target: [x86_64, x86, aarch64, armv7, riscv64] # loongarch64 excluded for now as pypi has no support
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.find-latest-tag.outputs.tag }}
      - name: Copy README.md and LICENSE
        run: |
          cp README.md pypi/
          cp LICENSE pypi/
          rm -f README.md
          rm -f LICENSE
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          working-directory: pypi
          target: ${{ matrix.target }}
          args: --release --out dist
          sccache: 'true'
          manylinux: musllinux_1_2
      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: "wheels-musllinux-${{ matrix.target }}"
          path: pypi/dist
          retention-days: 7

  windows:
    runs-on: ${{ matrix.runner }}
    needs: [find-latest-tag]
    strategy:
      matrix:
        runner: [windows-latest]
        target: [x64, x86]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.find-latest-tag.outputs.tag }}
      - name: Copy README.md and LICENSE
        run: |
          cp README.md pypi/
          cp LICENSE pypi/
          del README.md
          del LICENSE
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          working-directory: pypi
          target: ${{ matrix.target }}
          args: --release --out dist
          sccache: 'true'
      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: "wheels-windows-${{ matrix.target }}"
          path: pypi/dist
          retention-days: 7

  macos:
    runs-on: ${{ matrix.runner }}
    needs: [find-latest-tag]
    strategy:
      matrix:
        runner: [macos-14]
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.find-latest-tag.outputs.tag }}
      - name: Copy README.md and LICENSE
        run: |
          cp README.md pypi/
          cp LICENSE pypi/
          rm -f README.md
          rm -f LICENSE
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          working-directory: pypi
          target: ${{ matrix.target }}
          args: --release --out dist
          sccache: 'true'
      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: "wheels-macos-${{ matrix.target }}"
          path: pypi/dist
          retention-days: 7

  sdist:
    runs-on: ubuntu-latest
    needs: [find-latest-tag]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.find-latest-tag.outputs.tag }}
      - name: Copy README.md and LICENSE
        run: |
          cp README.md pypi/
          cp LICENSE pypi/
          rm -f README.md
          rm -f LICENSE
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          working-directory: pypi
          command: sdist
          args: --out dist
      - name: Upload sdist
        uses: actions/upload-artifact@v7
        with:
          name: "wheels-sdist"
          path: pypi/dist
          retention-days: 7

  release:
    name: Release
    runs-on: ubuntu-latest
    # if: startsWith(github.ref, 'refs/tags/')
    needs: [linux, musllinux, windows, macos, sdist]
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: pypi/dist
          pattern: wheels-*
          merge-multiple: true
      # - name: Check if version tag
      #   id: check-tag
      #   run: |
      #     if [[ ${{ github.ref }} =~ ^refs/tags/[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
      #       echo "is_version=true" >> $GITHUB_ENV
      #     else
      #       echo "is_version=false" >> $GITHUB_ENV
      #     fi
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: false
      - name: Publish to PyPI
        # if: env.is_version == 'true'
        env:
          UV_PUBLISH_TOKEN: ${{ vars.USE_TESTPYPI == 'true' && secrets.TESTPYPI_API_TOKEN || secrets.PYPI_API_TOKEN }}
        run: |
          for file in pypi/dist/*; do
            if [ "${{ vars.USE_TESTPYPI }}" == "true" ]; then
              uv publish --publish-url https://test.pypi.org/legacy/ --check-url https://test.pypi.org/simple/ "$file" || true
            else
              uv publish --check-url https://pypi.org/simple/ "$file" || true
            fi
          done
